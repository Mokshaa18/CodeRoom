# ── Server ─────────────────────────────────────────────────────────
server.port=8080

# ── MySQL ──────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/coderoom}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:yourpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Redis ──────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── JWT ────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:change-this-secret-in-production-min-256-bits}
jwt.expiration=86400000

# ── GitHub OAuth ───────────────────────────────────────────────────
github.client.id=${GITHUB_CLIENT_ID:your-github-oauth-app-client-id}
github.client.secret=${GITHUB_CLIENT_SECRET:your-github-oauth-app-client-secret}
github.redirect.uri=${GITHUB_REDIRECT_URI:http://localhost:8080/api/github/callback}

# ── Judge0 API ─────────────────────────────────────────────────────
judge0.api.url=${JUDGE0_API_URL:https://judge0-ce.p.rapidapi.com}
judge0.api.key=${JUDGE0_API_KEY:your-rapidapi-key-for-judge0}

# ── File Upload Limits ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

# ── Security (disable until Phase 3 of build) ──────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ── Logging ────────────────────────────────────────────────────────
logging.level.com.coderoom=INFO
logging.level.org.springframework.web.socket=INFO
